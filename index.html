<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Pool – Masters 2</title>
<style>
  body { font-family: Arial; padding: 20px; background: #fafafa; }
  table { border-collapse: collapse; width: 720px; background: #fff; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; }
  th { background: #eee; }
</style>
</head>
<body>

<h2>Masters Pool – Masters 2</h2>
<div id="updated" style="font-size:12px;color:#666;margin-bottom:10px;"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Total To‑Par</th>
    </tr>
  </thead>
  <tbody id="scores"></tbody>
</table>

<script>
const EVENT_ID = "401811941";
const REFRESH_MS = 300000;

const masters2Source = `
Scott/Phil,J. Rahm,R. McIlroy,X. Schauffele,S. Scheffler,J. Rahm,S. Scheffler,J. Rahm
Alon Tabak,X. Schauffele,S. Scheffler,S. Scheffler,S. Scheffler,J. Rahm,S. Scheffler,X. Schauffele
Nascar Style,J. Rahm,J. Rahm,J. Rahm,X. Schauffele,X. Schauffele,R. McIlroy,J. Rahm
Bash Brothers,S. Scheffler,S. Scheffler,S. Scheffler,J. Rahm,X. Schauffele,S. Scheffler,J. Rahm
Jeff Taylor,J. Rahm,X. Schauffele,R. McIlroy,J. Rahm,S. Scheffler,X. Schauffele,J. Rahm
`.trim();

const masters2Picks = masters2Source.split("
").map(r => {
  const c = r.split(",").map(x => x.trim());
  return { name: c[0], picks: c.slice(1) };
});

function normalize(val) {
  if (!val || val === "E") return 0;
  return Number(String(val).replace("+",""));
}

async function loadScores() {
  const res = await fetch(
    `https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=${EVENT_ID}`,
    { cache: "no-store" }
  );

  const data = await res.json();
  const scores = {};

  data.leaderboard.forEach(p => {
    const key = p.firstName[0] + ". " + p.lastName;
    scores[key] = normalize(p.score);
  });

  const results = masters2Picks.map(e => {
    let total = 0;
    e.picks.forEach(p => {
      if (scores[p] !== undefined) total += scores[p];
    });
    return { name: e.name, total };
  });

  results.sort((a,b) => a.total - b.total);

  const tbody = document.getElementById("scores");
  tbody.innerHTML = "";

  results.forEach((r,i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${r.name}</td>
        <td>${r.total}</td>
      </tr>`;
  });

  document.getElementById("updated").textContent =
    "Last updated: " + new Date().toLocaleString();
}

loadScores();
setInterval(loadScores, REFRESH_MS);
</script>

</body>
</html>

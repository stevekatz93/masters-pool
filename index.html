/* ================= ESPN HELPERS ================= */
function stripDiacritics(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function normLastName(l){
  let x=stripDiacritics(l).replace(/[^A-Za-z]/g,"").toLowerCase();
  if(x==="mcllroy")x="mcilroy";
  if(x.startsWith("mcl"))x=x.replace(/^mcl/,"mcil");
  return x;
}
function canonKey(f,l){return f?.[0]?.toLowerCase()+"|"+normLastName(l);}
function canonFromPick(p){
  const m=p.match(/^([A-Za-z])\.?\s+(.+)/);
  return m?canonKey(m[1],m[2]):null;
}
function fmt(n){if(n==null)return"—";if(n===0)return"E";return n>0?`+${n}`:`${n}`;}
async function fetchEventId(){
  const h=await fetch("https://site.web.api.espn.com/apis/v2/scoreboard/header?sport=golf&league=pga");
  const j=await h.json();
  return j?.sports?.[0]?.leagues?.[0]?.events?.[0]?.id;
}
async function fetchLeaderboard(id){
  const r=await fetch(`https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=${id}`);
  if(!r.ok)throw new Error("ESPN returned "+r.status);
  return r.json();
}
function collectScores(d){
  const map=new Map();
  const walk=o=>{
    if(!o)return;
    if(Array.isArray(o))return o.forEach(walk);
    if(typeof o==="object"){
      const n=o.displayName||o.athlete?.displayName;
      const tp=o.toPar??o.score?.toPar;
      if(n){
        const [f,...r]=n.split(" ");
        map.set(canonKey(f,r.join(" ")), typeof tp==="number"?tp:null);
      }
      Object.values(o).forEach(walk);
    }
  };
  walk(d);
  return map;
}

/* ================= SCORING ================= */
function scoreEntry(e,map){
  const picks=e.picks.map(p=>{
    const k=canonFromPick(p);
    const s=k?map.get(k):null;
    return {p,s:(s??0)};
  });
  const ranked=[...picks].sort((a,b)=>a.s-b.s);
  const counted=new Set(ranked.slice(0,5).map(x=>x.p));
  const total=ranked.slice(0,5).reduce((t,x)=>t+x.s,0);
  return {total,picks,counted};
}

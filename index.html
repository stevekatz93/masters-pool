}

async function loadScores() {
  const status=document.getElementById('status'); status.textContent='';
  try {
    const data=await fetchLeaderboard();
    const list=Array.isArray(data.leaderboard)?data.leaderboard:(Array.isArray(data.players)?data.players:[]);
    const map=new Map();
    list.forEach(p=>{ const k=keyFrom(p); if(k) map.set(k,normalize(p.score||p.toPar)); });
    const results=masters2Picks.map(e=>{ const vals=[]; e.picks.forEach(pk=>{ if(!pk) return; const v=map.get(pk); if(v!=null) vals.push(v); }); vals.sort((a,b)=>a-b); const best=vals.slice(0,5); return {name:e.name,total:best.reduce((s,x)=>s+x,0)}; });
    results.sort((a,b)=>a.total-b.total);
    const tb=document.getElementById('scores'); tb.innerHTML='';
    results.forEach((r,i)=>{ tb.insertAdjacentHTML('beforeend',`<tr><td class="right">${i+1}</td><td>${r.name}</td><td class="right">${r.total}</td></tr>`); });
    document.getElementById('updated').textContent='Last updated: '+new Date().toLocaleString();
  } catch(err) { status.textContent='Error: '+err; document.getElementById('updated').textContent='Update failed'; }
}
loadScores(); setInterval(loadScores,REFRESH_MS);
</script>

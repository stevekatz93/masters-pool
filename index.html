<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Pool Leaderboard</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 6px 8px; border-bottom: 1px solid #ccc; }
  th { text-align: left; }
  .right { text-align: right; }

  .golfers span { margin-right: 8px; white-space: nowrap; }
  .counted { font-weight: bold; }
  .dropped { color: #999; text-decoration: line-through; }
  .unmatched { color: #999; } /* should rarely appear now */
</style>
</head>

<body>
<h2>Masters Pool</h2>
<div id="status"></div>
<div id="updated" style="margin-bottom:10px;"></div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Entry</th>
      <th class="right">Total</th>
      <th>Golfers</th>
    </tr>
  </thead>
  <tbody id="scores"></tbody>
</table>

<script>
/* ================= CONFIG ================= */
const EVENT_ID = "401811935"; // Masters 2026 ESPN event id
const REFRESH_MS = 120000;

/* ================= PICKS DATA =================
   You already have this — paste or keep your existing array here.
   Format:
   const masters2Picks = [
     { name: "Team A", picks: ["J. Rahm","S. Scheffler", ...] },
     ...
   ];
*/
const masters2Picks = window.masters2Picks;

/* =============== ESPN FETCH ================= */
async function fetchESPN() {
  const urls = [
    `https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard/players?event=${EVENT_ID}`,
    `https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=${EVENT_ID}`
  ];
  for (const u of urls) {
    try {
      const r = await fetch(u, { cache: "no-store" });
      if (!r.ok) continue;
      return await r.json();
    } catch {}
  }
  throw new Error("Unable to fetch ESPN data");
}

/* =============== NORMALIZATION ================= */
function stripDiacritics(s) {
  return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function normLastName(last) {
  let x = stripDiacritics(last)
    .replace(/[^A-Za-z]/g, "")
    .toLowerCase();

  if (x === "mcllroy") x = "mcilroy";
  if (x.startsWith("mcl")) x = x.replace(/^mcl/, "mcil");

  return x;
}

function canonKey(first, last) {
  if (!first || !last) return null;
  return `${first[0].toLowerCase()}|${normLastName(last)}`;
}

function canonFromPick(pick) {
  const m = String(pick).trim().match(/^([A-Za-z])\.?\s*(.+)$/);
  return m ? canonKey(m[1], m[2]) : null;
}

/* =============== SCORE EXTRACTION ================= */
function normalizeToPar(v) {
  if (v == null) return null;
  if (typeof v === "object") {
    return normalizeToPar(v.toPar ?? v.displayValue ?? v.value);
  }
  const s = String(v).toUpperCase().trim();
  if (s === "E") return 0;
  const n = Number(s.replace("+", ""));
  return Number.isFinite(n) ? n : null;
}

function firstLastFromESPN(p) {
  if (p.firstName && p.lastName) return p;
  if (p.athlete?.displayName) {
    const parts = p.athlete.displayName.split(" ");
    return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
  }
  if (p.displayName) {
    const parts = p.displayName.split(" ");
    return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
  }
  return {};
}

function getPlayers(data) {
  return data.leaderboard ?? data.players ?? [];
}

function buildScoreMap(data) {
  const map = new Map();
  for (const p of getPlayers(data)) {
    const { firstName, lastName } = firstLastFromESPN(p);
    const key = canonKey(firstName, lastName);
    if (!key) continue;
    if (!map.has(key)) {
      map.set(
        key,
        normalizeToPar(
          p.toPar ??
          p.displayScore ??
          p.score ??
          p.scoring?.toPar ??
          p.scoring?.displayValue
        )
      );
    }
  }
  return map;
}

/* =============== SCORING ================= */
function formatScore(n) {
  if (n == null) return "—";
  if (n === 0) return "E";
  return n > 0 ? `+${n}` : n;
}

function scoreEntry(entry, scoreMap) {
  const resolved = entry.picks.map(p => {
    const key = canonFromPick(p);
    return { pick: p, score: key ? scoreMap.get(key) : null };
  });

  const scored = resolved
    .filter(r => typeof r.score === "number")
    .sort((a,b) => a.score - b.score);

  const counted = scored.slice(0,5);
  const countedSet = new Set(counted.map(c => c.pick));
  const total = counted.reduce((s,r) => s + r.score, 0);

  return { total, resolved, countedSet };
}

/* =============== RENDER ================= */
function renderGolfers(r) {
  return `<div class="golfers">${
    r.resolved.map(g => {
      let cls = "";
      if (typeof g.score === "number" && !r.countedSet.has(g.pick)) cls = "dropped";
      if (r.countedSet.has(g.pick)) cls = "counted";
      return `<span class="${cls}">${g.pick} (${formatScore(g.score)})</span>`;
    }).join("")
  }</div>`;
}

async function loadScores() {
  try {
    const data = await fetchESPN();
    const scoreMap = buildScoreMap(data);

    const rows = masters2Picks.map(e => {
      const r = scoreEntry(e, scoreMap);
      return { name: e.name, total: r.total, r };
    }).sort((a,b) => a.total - b.total);

    const tbody = document.getElementById("scores");
    tbody.innerHTML = "";

    rows.forEach((x,i) => {
      tbody.insertAdjacentHTML("beforeend", `
        <tr>
          <td class="right">${i+1}</td>
          <td>${x.name}</td>
          <td class="right">${x.total}</td>
          <td>${renderGolfers(x.r)}</td>
        </tr>
      `);
    });

    document.getElementById("updated").textContent =
      "Last updated: " + new Date().toLocaleString();
  } catch (e) {
    document.getElementById("status").textContent = e.message;
  }
}

loadScores();
setInterval(loadScores, REFRESH_MS);
</script>
</body>
</html>

// =================== ESPN HELPERS ===================
function stripDiacritics(s) {
  return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function normLastName(last) {
  let x = stripDiacritics(last).replace(/[^A-Za-z]/g,'').toLowerCase();
  // Fix pool-wide typo
  if (x === 'mcllroy') x = 'mcilroy';
  if (x.startsWith('mcl')) x = x.replace(/^mcl/, 'mcil');
  return x;
}

function canonKey(first, last) {
  if (!first || !last) return null;
  const i = String(first).trim().charAt(0).toLowerCase();
  const l = normLastName(last);
  if (!i || !l) return null;
  return i + '|' + l;
}

function canonFromPick(pick) {
  if (!pick) return null;
  const s = String(pick).trim();
  const m = s.match(/^\s*([A-Za-z])\s*\.?\s*(.+)\s*$/);
  if (!m) return null;
  return canonKey(m[1], m[2]);
}

function normalizeToPar(val) {
  if (val === null || val === undefined) return null;
  if (typeof val === 'object') {
    return normalizeToPar(val.toPar ?? val.displayValue ?? val.value);
  }
  const s = String(val).trim();
  if (!s) return null;
  const u = s.toUpperCase();
  if (u === 'E' || u === 'EVEN') return 0;
  const n = Number(s.replace('+',''));
  return Number.isFinite(n) ? n : null;
}

function extractName(obj) {
  if (!obj) return null;
  if (obj.firstName && obj.lastName) return String(obj.firstName).trim() + ' ' + String(obj.lastName).trim();
  if (obj.displayName) return String(obj.displayName).trim();
  if (obj.athlete && obj.athlete.displayName) return String(obj.athlete.displayName).trim();
  if (Array.isArray(obj.athletes) && obj.athletes[0] && obj.athletes[0].displayName) return String(obj.athletes[0].displayName).trim();
  if (obj.player && obj.player.displayName) return String(obj.player.displayName).trim();
  return null;
}

function firstLastFromDisplayName(dn) {
  const parts = String(dn).trim().split(/\s+/);
  if (parts.length < 2) return {first:null,last:null};
  return { first: parts[0], last: parts.slice(1).join(' ') };
}

function extractToPar(obj) {
  if (!obj) return null;
  return normalizeToPar(
    obj.toPar ??
    obj.displayScore ??
    obj.score ??
    obj.score?.toPar ??
    obj.score?.displayValue ??
    obj.scoring?.toPar ??
    obj.scoring?.displayValue ??
    null
  );
}

async function fetchLeaderboard(eventId) {
  const url = `https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=${eventId}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return await r.json();
}

async function fetchHeaderEventId() {
  const url = 'https://site.web.api.espn.com/apis/v2/scoreboard/header?sport=golf&league=pga&region=us&lang=en&contentorigin=espn';
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  const j = await r.json();
  const ev = j?.sports?.[0]?.leagues?.[0]?.events?.[0];
  return ev?.id || null;
}

function collectGolfers(root, maxNodes=60000) {
  const stack=[root];
  const out=[];
  let seen=0;
  while(stack.length && seen < maxNodes) {
    const cur = stack.pop();
    seen++;
    if (!cur) continue;
    if (Array.isArray(cur)) {
      for (const v of cur) stack.push(v);
      continue;
    }
    if (typeof cur === 'object') {
      const dn = extractName(cur);
      const tp = extractToPar(cur);
      if (dn) out.push({ dn, tp });
      for (const k of Object.keys(cur)) {
        const v = cur[k];
        if (v && typeof v === 'object') stack.push(v);
      }
    }
  }
  return out;
}

function buildScoreMap(data) {
  const golfers = collectGolfers(data);
  const map = new Map();
  for (const g of golfers) {
    const {first,last} = firstLastFromDisplayName(g.dn);
    const key = canonKey(first,last);
    if (!key) continue;
    const existing = map.get(key);
    if (existing === undefined || existing === null) {
      map.set(key, g.tp);
    } else {
      if (typeof existing !== 'number' && typeof g.tp === 'number') map.set(key, g.tp);
    }
  }
  return map;
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : String(n);
}

function scoreEntry(entry, scoreMap) {
  const picks = (entry.picks || []).map(p => {
    const key = canonFromPick(p);
    const score = key ? scoreMap.get(key) : null;
    return { pick: p, score: (score === undefined ? null : score) };
  });

  // best 5 of 7; pending treated as 0 for ranking until scores arrive
  const order = picks.map((x,idx)=>({idx, val: (typeof x.score==='number'?x.score:0)})).sort((a,b)=>a.val-b.val);
  const countedIdx = new Set(order.slice(0,5).map(o=>o.idx));
  const total = order.slice(0,5).reduce((s,o)=>s+o.val,0);

  return { total, picks, countedIdx };
}

function renderGolfers(detail) {
  return '<div class="golfers">' + detail.picks.map((p,i)=>{
    const isCounted = detail.countedIdx.has(i);
    const hasNumber = typeof p.score === 'number';
    const cls = isCounted ? 'counted' : (hasNumber ? 'dropped' : 'pending');
    return `<span class="${cls}">${p.pick} (${fmt(p.score)})</span>`;
  }).join(' ') + '</div>';
}

// =================== UI ===================
const elRows = document.getElementById('rows');
const elErr = document.getElementById('error');
const elStatus = document.getElementById('status');
const elUpdated = document.getElementById('updated');
const elCount = document.getElementById('count');
const elQ = document.getElementById('q');
const btnRefresh = document.getElementById('refresh');

let latest = [];

function render() {
  const q = (elQ.value || '').toLowerCase();
  const shown = q ? latest.filter(x => x.name.toLowerCase().includes(q)) : latest;
  elCount.textContent = `${shown.length} of ${latest.length} entries`;
  elRows.innerHTML = '';
  shown.forEach((r, idx) => {
    elRows.insertAdjacentHTML('beforeend', `
      <tr>
        <td class="right">${idx+1}</td>
        <td>${r.name}</td>
        <td class="right">${r.total}</td>
        <td>${renderGolfers(r.detail)}</td>
      </tr>
    `);
  });
}

async function refresh() {
  elErr.textContent = '';
  elStatus.textContent = 'Fetching ESPN…';
  btnRefresh.disabled = true;

  try {
    let data;
    try {
      data = await fetchLeaderboard(EVENT_ID);
    } catch (e) {
      const newId = await fetchHeaderEventId();
      if (!newId) throw e;
      EVENT_ID = newId;
      data = await fetchLeaderboard(EVENT_ID);
    }

    const scoreMap = buildScoreMap(data);

    latest = masters2Picks.map(e => {
      const detail = scoreEntry(e, scoreMap);
      return { name: e.name, total: detail.total, detail };
    }).sort((a,b)=>a.total-b.total);

    elStatus.textContent = 'Live';
    elUpdated.textContent = new Date().toLocaleString();
    render();
  } catch (err) {
    elStatus.textContent = 'No data';
    elErr.textContent =
      'Could not load ESPN data.\n' +
      String(err) +
      '\n\nIf you opened this file directly (file://), some browsers block cross-site requests.\nTry running a local server: python -m http.server 8000, then open http://localhost:8000/index.html';
  } finally {
    btnRefresh.disabled = false;
  }
}

elQ.addEventListener('input', render);
btnRefresh.addEventListener('click', refresh);

refresh();
setInterval(refresh, REFRESH_MS);
</script>
